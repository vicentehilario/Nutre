<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 600px; height: 600px; overflow: hidden; }
  .wrap {
    width: 600px;
    height: 600px;
    background: linear-gradient(145deg, #1a2e1c 0%, #0d1a0f 60%, #0a130b 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    position: relative;
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
  }

  /* Glow sutil atrás */
  .glow {
    position: absolute;
    width: 320px;
    height: 320px;
    background: radial-gradient(circle, rgba(34,197,94,0.12) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -60%);
  }

  /* Ícone container */
  .icon-wrap {
    position: relative;
    margin-bottom: 32px;
  }

  .icon-box {
    width: 220px;
    height: 220px;
    border-radius: 50px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(34,197,94,0.15);
    overflow: hidden;
  }

  /* Textos */
  .brand {
    font-size: 48px;
    font-weight: 800;
    color: white;
    letter-spacing: -1px;
    margin-bottom: 12px;
  }

  .tagline {
    font-size: 17px;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.3px;
    text-align: center;
    line-height: 1.5;
    max-width: 360px;
  }

</style>
</head>
<body>
<div class="wrap">
  <div class="glow"></div>
  <div class="icon-wrap">
    <div class="icon-box">
      <svg width="220" height="220" viewBox="0 0 100 100" fill="none">
        <rect width="100" height="100" fill="url(#grad)"/>
        <defs>
          <linearGradient id="grad" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#1c2b1e"/>
            <stop offset="100%" stop-color="#0d1a0f"/>
          </linearGradient>
        </defs>
        <path d="M 18,18 L 31,18 L 68,82 L 82,82 L 82,18 L 69,18 L 32,82 L 18,82 Z" fill="white"/>
      </svg>
    </div>
  </div>

  <div class="brand">Nutre</div>
  <div class="tagline">Seu nutricionista pessoal com inteligência artificial</div>
</div>
</body>
</html>
